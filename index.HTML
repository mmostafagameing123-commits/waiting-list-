<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة الانتظار - مجموعة العربي</title>
    <style>
        :root {
            --primary: #004b93;
            --primary-dark: #003366;
            --primary-light: #e8f1f9;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            padding: 15px 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .main-wrapper { width: 100%; max-width: 1000px; }

        /* شاشة تسجيل الدخول */
        .login-card {
            max-width: 400px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
        }

        .brand-logo {
            width: 60px; height: 60px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px;
            font-size: 22px; font-weight: bold;
        }

        .login-card h2 { color: var(--primary); margin-bottom: 5px; font-size: 20px; }
        .login-card p { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; }

        .form-group { margin-bottom: 15px; text-align: right; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background: #fafafa;
        }

        .form-control:focus { border-color: var(--primary); background: #fff; }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-danger {
            background: #fee2e2;
            color: var(--danger);
            border: 1px solid #fca5a5;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        /* Dashboard Header */
        header {
            background: var(--card-bg);
            padding: 15px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        header h3 { color: var(--primary); font-size: 16px; }

        .user-badge {
            background: var(--primary-light);
            color: var(--primary);
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
        }

        .card {
            background: var(--card-bg);
            padding: 18px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .card-header h4 { color: var(--primary); font-size: 15px; }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        .product-group { display: flex; gap: 5px; margin-bottom: 8px; }

        .btn-add-prod {
            background: var(--primary-light);
            color: var(--primary);
            border: 1px dashed var(--primary);
            padding: 8px;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .table-container { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; text-align: right; font-size: 13px; min-width: 600px; }
        th { background: var(--primary-light); color: var(--primary); padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid var(--border); }

        .tag {
            background: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            display: inline-block;
            margin: 1px;
        }

        .btn-wa {
            background: #25D366;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .sales-item {
            background: var(--bg);
            padding: 8px;
            border-radius: 6px;
            margin-top: 5px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="main-wrapper">

        <!-- شاشة تسجيل الدخول -->
        <div id="loginSection" class="login-card">
            <div class="brand-logo">EL</div>
            <h2>مجموعة العربي</h2>
            <p>نظام إدارة قائمة الانتظار والمبيعات</p>
            
            <form onsubmit="login(event)">
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="userInput" class="form-control" placeholder="أدخل اسم المستخدم" required>
                </div>
                
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="passInput" class="form-control" placeholder="أدخل كلمة المرور" required>
                </div>

                <button type="submit" class="btn">تسجيل الدخول</button>
            </form>

            <div style="margin-top: 15px; padding: 10px; background: var(--primary-light); border-radius: 8px; font-size: 11px; text-align: right; color: var(--primary-dark);">
                💡 <b>تجربة الدخول:</b><br>
                • المدير: admin / admin123<br>
                • سيلز: sara / 123
            </div>
        </div>

        <!-- لوحة التحكم -->
        <div id="dashboardSection" class="hidden">
            
            <header>
                <h3>🏢 مجموعة العربي <span id="userBadge" class="user-badge"></span></h3>
                <button class="btn-danger" onclick="logout()">خروج</button>
            </header>

            <!-- لوحة المدير -->
            <div id="adminPanel" class="card hidden">
                <div class="card-header">
                    <h4>⚙️ إعدادات المدير</h4>
                </div>
                <h5 style="margin-bottom: 5px; font-size: 13px;">إضافة موظف جديد:</h5>
                <div class="grid-3" style="margin-bottom: 8px;">
                    <input type="text" id="salesName" class="form-control" placeholder="اسم الموظف">
                    <input type="text" id="salesUser" class="form-control" placeholder="اسم المستخدم">
                    <input type="password" id="salesPass" class="form-control" placeholder="كلمة السر">
                </div>
                <button class="btn" style="width: auto; padding: 6px 15px;" onclick="addSales()">إضافة الموظف</button>
                <div id="salesList" style="margin-top: 10px;"></div>
            </div>

            <!-- إضافة عميل -->
            <div class="card">
                <div class="card-header">
                    <h4>➕ إضافة عميل جديد</h4>
                </div>
                <form onsubmit="saveClient(event)">
                    <div class="grid-3" style="margin-bottom: 10px;">
                        <input type="text" id="cName" class="form-control" placeholder="اسم العميل" required>
                        <input type="tel" id="cPhone" class="form-control" placeholder="رقم الهاتف" required>
                        <input type="text" id="cAddr" class="form-control" placeholder="العنوان" required>
                    </div>

                    <div class="form-group">
                        <label>المنتجات المطلوبة:</label>
                        <div id="productsBox">
                            <div class="product-group">
                                <input type="text" class="form-control prod-input" placeholder="اسم المنتج (مثال: شاشة تورنادو)" required>
                            </div>
                        </div>
                        <button type="button" class="btn-add-prod" onclick="addProductInput()">+ إضافة منتج آخر</button>
                    </div>

                    <button type="submit" class="btn">حفظ العميل</button>
                </form>
            </div>

            <!-- الجدول -->
            <div class="card">
                <div class="card-header">
                    <h4>📋 قائمة الانتظار</h4>
                    <input type="text" id="searchBox" onkeyup="renderTable()" class="form-control" placeholder="🔍 بحث..." style="max-width: 150px;">
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>التاريخ</th>
                                <th>العميل</th>
                                <th>الهاتف</th>
                                <th>المنتجات</th>
                                <th>الموظف</th>
                                <th>واتساب</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>

        </div>

    </div>

    <script>
        let accounts = JSON.parse(localStorage.getItem('araby_accs')) || [
            { id: 1, name: "المدير العام", user: "admin", pass: "admin123", role: "admin" },
            { id: 2, name: "سارة أحمد", user: "sara", pass: "123", role: "sales" }
        ];

        let clients = JSON.parse(localStorage.getItem('araby_cls')) || [];
        let activeUser = null;

        function login(e) {
            e.preventDefault();
            let u = document.getElementById('userInput').value.trim().toLowerCase();
            let p = document.getElementById('passInput').value.trim();

            let account = accounts.find(a => a.user.toLowerCase() === u && a.pass === p);

            if (account) {
                activeUser = account;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                document.getElementById('userBadge').innerText = `${account.name}`;

                if (account.role === 'admin') {
                    document.getElementById('adminPanel').classList.remove('hidden');
                    renderSales();
                } else {
                    document.getElementById('adminPanel').classList.add('hidden');
                }
                renderTable();
            } else {
                alert("بيانات الدخول غير صحيحة!");
            }
        }

        function logout() {
            activeUser = null;
            document.getElementById('dashboardSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
        }

        function addProductInput() {
            let box = document.getElementById('productsBox');
            let div = document.createElement('div');
            div.className = 'product-group';
            div.innerHTML = `
                <input type="text" class="form-control prod-input" placeholder="منتج إضافي" required>
                <button type="button" onclick="this.parentElement.remove()" style="background:#fee2e2; color:red; border:none; padding:0 8px; border-radius:4px;">X</button>
            `;
            box.appendChild(div);
        }

        function saveClient(e) {
            e.preventDefault();
            let prodInputs = document.querySelectorAll('.prod-input');
            let prodList = [];
            prodInputs.forEach(input => { if(input.value.trim()) prodList.push(input.value.trim()); });

            let now = new Date();
            let dateStr = now.toLocaleDateString('ar-EG');

            clients.push({
                id: Date.now(),
                date: dateStr,
                name: document.getElementById('cName').value.trim(),
                phone: document.getElementById('cPhone').value.trim(),
                addr: document.getElementById('cAddr').value.trim(),
                products: prodList,
                salesUser: activeUser.user,
                salesName: activeUser.name
            });

            localStorage.setItem('araby_cls', JSON.stringify(clients));

            document.getElementById('cName').value = '';
            document.getElementById('cPhone').value = '';
            document.getElementById('cAddr').value = '';
            document.getElementById('productsBox').innerHTML = `<div class="product-group"><input type="text" class="form-control prod-input" placeholder="اسم المنتج" required></div>`;

            renderTable();
            alert("تم حفظ العميل بنجاح!");
        }

        function renderTable() {
            let tbody = document.getElementById('tableBody');
            let search = document.getElementById('searchBox').value.toLowerCase().trim();
            tbody.innerHTML = '';

            let list = activeUser.role === 'admin' ? clients : clients.filter(c => c.salesUser === activeUser.user);

            list = list.filter(c => c.name.toLowerCase().includes(search) || c.phone.includes(search));

            if(list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:15px; color:var(--text-muted);">لا توجد بيانات</td></tr>`;
                return;
            }

            list.forEach((c, i) => {
                let tags = c.products.map(p => `<span class="tag">${p}</span>`).join('');
                let msg = `مرحباً أستاذ ${c.name}، يسعدنا إبلاغك من مجموعة العربي بأن المنتجات التالية أصبحت متوفرة: (${c.products.join(' - ')})`;
                let waPhone = c.phone.startsWith('0') ? '2' + c.phone : c.phone;

                tbody.innerHTML += `
                    <tr>
                        <td>${i + 1}</td>
                        <td>${c.date}</td>
                        <td><b>${c.name}</b></td>
                        <td>${c.phone}</td>
                        <td>${tags}</td>
                        <td><small>${c.salesName}</small></td>
                        <td><a href="https://api.whatsapp.com/send?phone=${waPhone}&text=${encodeURIComponent(msg)}" target="_blank" class="btn-wa">💬 مراسلة</a></td>
                    </tr>
                `;
            });
        }

        function addSales() {
            let name = document.getElementById('salesName').value.trim();
            let user = document.getElementById('salesUser').value.trim().toLowerCase();
            let pass = document.getElementById('salesPass').value.trim();

            if (name && user && pass) {
                accounts.push({ id: Date.now(), name, user, pass, role: 'sales' });
                localStorage.setItem('araby_accs', JSON.stringify(accounts));
                renderSales();
                document.getElementById('salesName').value = '';
                document.getElementById('salesUser').value = '';
                document.getElementById('salesPass').value = '';
            }
        }

        function renderSales() {
            let listDiv = document.getElementById('salesList');
            let salesAccounts = accounts.filter(a => a.role === 'sales');
            listDiv.innerHTML = '';
            salesAccounts.forEach(a => {
                listDiv.innerHTML += `
                    <div class="sales-item">
                        <span>👤 ${a.name} (${a.user})</span>
                        <button class="btn-danger" onclick="accounts=accounts.filter(x=>x.id!==${a.id}); localStorage.setItem('araby_accs',JSON.stringify(accounts)); renderSales();">حذف</button>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
